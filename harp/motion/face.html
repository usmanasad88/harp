<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HARP Face</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family: monospace; }
  .face { width:100%; height:100vh; position:relative; display:flex; align-items:center; justify-content:center; gap:8vw;
          transition: opacity .6s ease; }

  .eye { width:12vw; height:12vw; max-width:190px; max-height:190px; background:#00e5ff; border-radius:50%;
         box-shadow:0 0 40px #00e5ff, 0 0 80px #00e5ff; transition: all .35s ease; }

  /* ---- offline / no human: dim + sad ------------------------------------ */
  /* Whole face dimmed, eyes drooped and desaturated, slow mournful sway. */
  .sad { opacity:.45; }
  .sad .eye {
    background:#164352;
    box-shadow:0 0 20px #164352;
    transform: translateY(1.5vh) scaleY(0.8);
    animation: sadsway 3s infinite ease-in-out;
  }
  @keyframes sadsway { 0%,100% { transform: translateY(1.5vh) scaleY(0.8); } 50% { transform: translateY(2vh) scaleY(0.75); } }

  /* ---- connected, nobody yet: calm neutral, gently blinking ------------- */
  .neutral { opacity:.8; }
  .neutral .eye { animation: blink 4.5s infinite; }
  @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.08); } }

  /* ---- human detected: bright + happy ----------------------------------- */
  .happy { opacity:1; }
  .happy .eye {
    height:6vw; max-height:95px;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:#33f0ff;
    box-shadow:0 0 50px #33f0ff, 0 0 100px #33f0ff;
    animation:none;
  }

  /* ---- listening (talk button held): whole face green ------------------- */
  .listening { opacity:1; }
  .listening .eye {
    background:#3bff8f;
    box-shadow:0 0 60px #3bff8f, 0 0 120px #17c46a;
    animation: listenpulse 1.1s infinite ease-in-out;
  }
  @keyframes listenpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* ---- thinking (waiting for reply): eyes drift side to side ------------ */
  .thinking { opacity:.95; }
  .thinking .eye {
    background:#00c3ff;
    box-shadow:0 0 45px #00c3ff, 0 0 90px #00c3ff;
    animation: think 1.6s infinite ease-in-out;
  }
  @keyframes think {
    0%,100% { transform: translateX(-2.2vw); }
    50%     { transform: translateX(2.2vw); }
  }

  /* ---- talking (agent speaking): bright + happy eyes, mouth animates ---- */
  .talking { opacity:1; }
  .talking .eye {
    height:6vw; max-height:95px;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:#33f0ff;
    box-shadow:0 0 50px #33f0ff, 0 0 100px #33f0ff;
    animation:none;
  }

  /* ---- mouth ------------------------------------------------------------- */
  .mouth-wrap { position:absolute; bottom:12vh; left:50%; transform: translateX(-50%);
                width:22vw; max-width:320px; height:8vh; display:flex; align-items:center; justify-content:center; }
  .mouth { width:100%; background:#00e5ff; border-radius:8px; box-shadow:0 0 30px #00e5ff; height:8px;
           transition: all .15s ease; }

  .happy .mouth, .talking .mouth, .listening .mouth {
    height:5vh; max-height:60px;
    border-radius:0 0 60px 60px / 0 0 40px 40px;
    background:#33f0ff;
    box-shadow:0 0 30px #33f0ff;
  }
  .listening .mouth { background:#3bff8f; box-shadow:0 0 30px #3bff8f; }

  /* Talking: the mouth flaps open and shut in a lively speaking rhythm. */
  .talking .mouth {
    animation: talk .28s infinite ease-in-out;
    transform-origin: center;
  }
  @keyframes talk {
    0%   { height:.8vh; }
    50%  { height:6vh; }
    100% { height:1.6vh; }
  }

  .sad .mouth {
    height:3vh; max-height:30px;
    border-radius:40px 40px 0 0 / 30px 30px 0 0;
    background:#164352;
    box-shadow:0 0 20px #164352;
  }

  #label { position:absolute; top:16px; left:50%; transform: translateX(-50%); color:#333; font-size:14px;
           letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>
  <div id="face" class="face sad">
    <div class="eye"></div>
    <div class="eye"></div>
    <div class="mouth-wrap"><div class="mouth"></div></div>
  </div>
  <div id="label">connecting</div>

<script>
  // The face reflects the whole interaction, resolved every poll from three
  // signals in /state (served by harp/motion/face_server.py):
  //   connected   — did the /state fetch succeed at all
  //   data.face   — webcam sees a human (head tracker)
  //   data.interaction — push-to-talk phase: idle|listening|thinking|talking
  //
  // Priority, highest first: a held talk button (listening) wins; then the
  // agent speaking (talking); then waiting on a reply (thinking); then just
  // seeing a person (happy); connected-but-alone is neutral; and no connection
  // is sad + dim. Same idea as the dashboard kiosk (user.js), as a face.
  const face = document.getElementById('face');
  const label = document.getElementById('label');
  let current = null;

  function setEmotion(name) {
    if (name === current) return;
    current = name;
    face.className = 'face ' + name;
    label.textContent = name;
  }

  function resolve(connected, data) {
    if (!connected) return 'sad';
    const phase = data.interaction || 'idle';
    if (phase === 'listening') return 'listening';
    if (phase === 'talking') return 'talking';
    if (phase === 'thinking') return 'thinking';
    // idle conversation phase: fall back to plain presence.
    if (data.face) return 'happy';
    return 'neutral';
  }

  async function poll() {
    try {
      const res = await fetch('/state', { cache: 'no-store' });
      const data = await res.json();
      setEmotion(resolve(true, data));
    } catch (e) {
      // Server not reachable (HARP down / not started yet): sad + dim.
      setEmotion(resolve(false, {}));
    }
    setTimeout(poll, 300);
  }
  poll();
</script>
</body>
</html>
