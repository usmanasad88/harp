<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HARP Face</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:#000; overflow:hidden; font-family: monospace; }
  .face { width:100%; height:100vh; position:relative; display:flex; align-items:center; justify-content:center; gap:8vw; }
  .eye { width:12vw; height:12vw; max-width:190px; max-height:190px; background:#00e5ff; border-radius:50%;
         box-shadow:0 0 40px #00e5ff, 0 0 80px #00e5ff; transition: all 0.35s ease; }

  .neutral .eye { animation: blink 4.5s infinite; }
  @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.08); } }

  .happy .eye {
    height:6vw; max-height:95px;
    border-radius:50% 50% 0 0 / 100% 100% 0 0;
    background:#33f0ff;
    box-shadow:0 0 50px #33f0ff, 0 0 100px #33f0ff;
    animation:none;
  }

  .sad .eye {
    background:#164352;
    box-shadow:0 0 20px #164352;
    transform: translateY(1.5vh) scaleY(0.8);
    animation: sadsway 3s infinite ease-in-out;
  }
  @keyframes sadsway { 0%,100% { transform: translateY(1.5vh) scaleY(0.8); } 50% { transform: translateY(2vh) scaleY(0.75); } }

  .surprised .eye {
    width:16vw; height:16vw; max-width:250px; max-height:250px;
    background:#aef7ff;
    box-shadow:0 0 60px #aef7ff, 0 0 120px #66e5ff;
    animation:none;
  }

  .excited .eye {
    background:#00c3ff;
    box-shadow:0 0 60px #00c3ff, 0 0 110px #00c3ff;
    animation: pulse 0.4s infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.12); } }

  .mouth-wrap { position:absolute; bottom:12vh; left:50%; transform: translateX(-50%);
                width:22vw; max-width:320px; height:6vh; display:flex; align-items:center; justify-content:center; }
  .mouth { width:100%; background:#00e5ff; border-radius:8px; box-shadow:0 0 30px #00e5ff; height:8px; transition: all .15s ease; }

  .happy .mouth, .excited .mouth {
    height:5vh; max-height:60px;
    border-radius:0 0 60px 60px / 0 0 40px 40px;
    background:#33f0ff;
    box-shadow:0 0 30px #33f0ff;
  }
  .sad .mouth {
    height:3vh; max-height:30px;
    border-radius:40px 40px 0 0 / 30px 30px 0 0;
    background:#164352;
    box-shadow:0 0 20px #164352;
  }
  .surprised .mouth {
    width:6vw; height:6vw; max-width:80px; max-height:80px;
    border-radius:50%;
    background:#aef7ff;
    box-shadow:0 0 30px #aef7ff;
  }

  #label { position:absolute; top:16px; left:50%; transform: translateX(-50%); color:#333; font-size:14px;
           letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>
  <div id="face" class="face sad">
    <div class="eye"></div>
    <div class="eye"></div>
    <div class="mouth-wrap"><div class="mouth"></div></div>
  </div>
  <div id="label">sad</div>

<script>
  const face = document.getElementById('face');
  const label = document.getElementById('label');
  let lastFace = null;
  let excitedTimer = null;

  function setEmotion(name) {
    face.className = 'face ' + name;
    label.textContent = name;
  }

  async function poll() {
    try {
      const res = await fetch('/state', { cache: 'no-store' });
      const data = await res.json();
      if (data.face !== lastFace) {
        lastFace = data.face;
        if (data.face) {
          setEmotion('surprised');
          setTimeout(() => { if (lastFace) setEmotion('happy'); }, 700);
          clearTimeout(excitedTimer);
          excitedTimer = setTimeout(() => {
            if (lastFace) { setEmotion('excited'); setTimeout(() => lastFace && setEmotion('happy'), 900); }
          }, 6000 + Math.random() * 4000);
        } else {
          clearTimeout(excitedTimer);
          setEmotion('sad');
        }
      }
    } catch (e) {
      // server not reachable yet — keep last state, try again
    }
    setTimeout(poll, 300);
  }
  poll();
</script>
</body>
</html>
